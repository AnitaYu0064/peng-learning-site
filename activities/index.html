<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動照片紀錄｜彭頌哲自學歷程</title>
  <style>
    :root{
      --bg:#f7f8fa;
      --card:#ffffff;
      --text:#111827;
      --sub:#374151;
      --line:#e2e8f0;
      --accent:#1d4ed8;
      --soft:#eff6ff;
      --accent2:#1a2744;
      --header-bg:#1a2744;
      --shadow:0 2px 8px rgba(0,0,0,.04), 0 6px 20px rgba(26,39,68,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      background:#f7f8fa;
      color:var(--text);
      line-height:1.9;
      font-size:18px;
    }
    /* ── SITE HEADER ── */
    .site-header{background:var(--header-bg);padding:14px 24px;box-shadow:0 2px 14px rgba(26,39,68,.22);}
    .site-header-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .site-header-label{color:rgba(255,255,255,.65);font-size:13px;font-weight:700;letter-spacing:0.4px;}
    /* ── NAV BUTTONS ── */
    .page-nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px;padding-top:4px;}
    .nav-btn{
      display:inline-flex;align-items:center;gap:7px;text-decoration:none;
      background:var(--accent);color:#fff !important;
      padding:10px 18px;border-radius:10px;font-size:15px;font-weight:700;
      box-shadow:0 3px 10px rgba(29,78,216,.2);
      transition:background .18s,transform .15s;
    }
    .nav-btn:hover{background:#1e3a8a;transform:translateY(-1px);}
    /* ── LAYOUT ── */
    .wrap{max-width:1120px;margin:0 auto;padding:24px 20px 72px;}
    .hero{
      background:#ffffff;border:1px solid var(--line);border-left:5px solid var(--accent2);border-radius:0 14px 14px 0;padding:28px 30px 24px;box-shadow:0 2px 8px rgba(0,0,0,.04),0 4px 16px rgba(26,39,68,.05);margin-bottom:28px;
    }
    .eyebrow{
      display:inline-block;padding:4px 10px;border-radius:4px;background:var(--accent2);color:#fff;font-size:11px;font-weight:700;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase;
    }
    h1{margin:0 0 10px;font-size:38px;line-height:1.2;letter-spacing:-.02em;color:var(--accent2);}
    .lead{margin:0;font-size:19px;color:var(--sub);max-width:900px;}
    /* ── ACTIVITY CARDS ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px;}
    .card{
      background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:22px 24px 22px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;flex-direction:column;align-items:flex-start;transition:box-shadow .18s;
    }
    .card:hover{box-shadow:0 10px 28px rgba(26,39,68,.10);transform:translateY(-1px);}
    .card-date{
      display:inline-block;padding:5px 11px;border-radius:999px;
      background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:700;
      margin-bottom:10px;letter-spacing:0.3px;border:1px solid #bfdbfe;
    }
    .card h2{margin:0 0 8px;font-size:24px;line-height:1.35;color:var(--accent2);}
    .card p{margin:0 0 18px;color:var(--sub);font-size:16px;line-height:1.75;flex-grow:1;}
    .record-btn{
      display:inline-flex;align-items:center;gap:6px;
      text-decoration:none;background:var(--accent);color:#fff;
      padding:10px 16px;border-radius:10px;font-size:15px;font-weight:800;
      box-shadow:0 3px 10px rgba(29,78,216,.2);
      transition:background .18s,transform .15s;
      margin-top:auto;
    }
    .record-btn:hover{background:#1e3a8a;transform:translateY(-1px);}
    .footer{margin-top:26px;text-align:center;color:#6b7280;font-size:14px;}
    @media (max-width:700px){
      body{font-size:17px}
      .wrap{padding:18px 14px 52px}
      h1{font-size:30px}
      .lead,.card p{font-size:16px}
      .card h2{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="site-header">
    <div class="site-header-inner">
      <span class="site-header-label">彭頌哲自學歷程記錄網站</span>
    </div>
  </div>

  <div class="wrap">
    <div class="page-nav">
      <a class="nav-btn" href="../index.html">← 返回首頁</a>
    </div>

    <div class="hero">
      <div class="eyebrow">活動紀錄　·　生活學習　·　自然體驗</div>
      <h1>活動照片紀錄</h1>
      <p class="lead">收錄頌哲參與各類戶外活動與實地體驗的照片紀錄，呈現學習歷程中的生活實踐面向。每一頁活動記錄都補足了純文字報告之外的真實樣貌，讓閱讀者更完整地理解他的學習生活與身體參與。</p>
    </div>

    <div class="grid">

      <div class="card">
        <span class="card-date">📅 2026 年 4 月 1 日</span>
        <h2>福德坑溪戶外活動紀錄</h2>
        <p>溪邊涉水、觀察石頭與水流、在自然場域中停留與放鬆，並在溪邊彈奏吉他。記錄與家人一同參與的大自然體驗，呈現身體運動、感官探索與生活情境的多元面向。</p>
        <a class="record-btn" href="shanxi-outdoor-record.html">查看活動紀錄 →</a>
      </div>

    </div>

    <div class="footer">活動紀錄持續更新中，每一頁皆包含照片與文字說明。</div>
  </div>
</body>
</html>
